<!DOCTYPE html>
<html>
<head>
    <title>AR Scanner (DUAL WORKER ENGINE) - GEOMETRY & CROP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #viewport { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: 1; }
        #tracking-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        #webcam, #cv-canvas, #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #cv-canvas { z-index: 10; pointer-events: none; display: block; }
        #video-container { z-index: 15; pointer-events: none; }
        #debug-overlay {
            position: absolute; top: 15px; left: 15px; z-index: 999;
            color: #00FF00; font-family: monospace; font-size: 14px;
            font-weight: bold; text-shadow: 2px 2px 2px #000;
            pointer-events: none;
        }

        #debug-toggle {
            position: absolute; top: 80px; left: 15px; z-index: 1000;
            background: rgba(0, 0, 0, 0.8); color: lime; border: 1px solid lime;
            padding: 8px 12px; cursor: pointer; border-radius: 5px; font-weight: bold;
            font-family: monospace;
        }
        #debug-panel {
            position: absolute; top: 120px; left: 15px; z-index: 999;
            background: rgba(0, 0, 0, 0.85); color: white; padding: 12px;
            border-radius: 5px; font-family: monospace; font-size: 12px;
            display: none;
            flex-direction: column; gap: 8px; width: 220px;
            border: 1px solid #444;
            max-height: 70vh; overflow-y: auto;
        }
        #debug-panel label { display: flex; justify-content: space-between; font-weight: bold; color: #ddd; }
        #debug-panel input[type=range] { width: 100%; cursor: pointer; margin-top: 3px; }

        .ar-video-element {
            position: absolute; top: 0; left: 0; transform-origin: 0 0;
            box-shadow: 0px 0px 30px rgba(0,0,0,0.9);
            opacity: 0.95; transition: opacity 0.2s ease-in-out; display: none;
        }
        #start-overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #0a0a0a; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { background: #FFF; color: #000; border: none; padding: 16px 36px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s; }
        #start-btn:active { transform: scale(0.95); }
        #proxy-canvas, #ai-canvas { display: none; }
    </style>
</head>
<body>
    <div id="start-overlay">
        <button id="start-btn">Start Advanced AR Tracker</button>
    </div>

    <div id="debug-overlay">
        Worker: <span id="worker-status">Booting...</span><br>
        Tracked: <span id="track-count">0</span><br>
        AI Log: <span id="ai-debug">Waiting for Model...</span>
    </div>

    <button id="debug-toggle">⚙️ Debug Menu</button>

    <div id="debug-panel">
        <div>
            <label>Scan Res: <span id="lbl-resolution">480p</span></label>
            <input type="range" id="inp-resolution" min="0" max="4" step="1" value="2">
        </div>
        <div>
            <label>AI Crop %: <span id="lbl-ai-crop">10</span>%</label>

        </div>
        <div>
            <label>Square Tolerance: <span id="lbl-square-tol">1.5</span>x</label>
            <input type="range" id="inp-square-tol" min="1.0" max="3.0" step="0.05" value="1.5">
        </div>
        <div>
            <label>Max Variance: <span id="lbl-variance">1500</span></label>
            <input type="range" id="inp-variance" min="100" max="5000" step="100" value="1500">
        </div>
        <div>
            <label>Contrast Boost: <span id="lbl-contrast">1.5</span>x</label>
            <input type="range" id="inp-contrast" min="1.0" max="3.0" step="0.1" value="1.5">
        </div>
        <div>
            <label>Morph Thresh: <span id="lbl-morph-thresh">30</span></label>
            <input type="range" id="inp-morph-thresh" min="0" max="255" value="30">
        </div>
        <div>
            <label>Kernel Size: <span id="lbl-morph-kernel">5</span></label>
            <input type="range" id="inp-morph-kernel" min="3" max="15" step="2" value="5">
        </div>
        <div>
            <label>Max Cosine: <span id="lbl-cosine">0.3</span></label>
            <input type="range" id="inp-cosine" min="0.1" max="1.0" step="0.05" value="0.3">
        </div>
        <div>
            <label>Min Area %: <span id="lbl-min-area">0.5</span>%</label>
            <input type="range" id="inp-min-area" min="0.1" max="10" step="0.1" value="0.5">
        </div>
        <div>
            <label>Max Area %: <span id="lbl-max-area">50</span>%</label>
            <input type="range" id="inp-max-area" min="10" max="100" step="1" value="50">
        </div>
    </div>

    <div id="viewport">
        <div id="tracking-container">
            <video id="webcam" autoplay muted playsinline></video>
            <canvas id="cv-canvas"></canvas>
            <div id="video-container"></div>
        </div>
    </div>

    <canvas id="proxy-canvas"></canvas>
    <canvas id="ai-canvas" width="224" height="224"></canvas>

    <!-- ======================================================== -->
    <!-- WORKER 1: OPENCV OPTICAL FLOW TRACKER                    -->
    <!-- ======================================================== -->
    <script id="cv-worker" type="javascript/worker">
        self.Module = { onRuntimeInitialized: function() { self.postMessage({ type: 'ready' }); } };

        let cvLoaded = false;
        let prevGray = null;
        let trackedShapes = [];
        let frameCount = 0;

        let forceGlobalScan = true;
        let framesSinceLastScan = 0;

        let proxySrc = null, proxyGray = null;
        let downscaledSrc = null, downscaledGray = null;
        let tempGray = null, proxyEdges = null;
        let dilateKernel = null, morphKernel = null;
        let contours = null, hierarchy = null, approx = null, cornersFloat = null;
        let p0 = null, p1 = null, st = null, err = null;
        let currentMorphKernelSize = -1;

        function sortCornersClockwise(ptsArray) {
            let pts = []; let cx = 0, cy = 0;
            for (let i = 0; i < 4; i++) { pts.push({ x: ptsArray[i*2], y: ptsArray[i*2+1] }); cx += ptsArray[i*2]; cy += ptsArray[i*2+1]; }
            cx /= 4; cy /= 4;
            pts.sort((a, b) => { return Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx); });
            let sorted = [];
            for (let i = 0; i < 4; i++) { sorted.push(pts[i].x, pts[i].y); }
            return sorted;
        }

        function getAngle(pt1, pt2, pt0) {
            let dx1 = pt1.x - pt0.x; let dy1 = pt1.y - pt0.y;
            let dx2 = pt2.x - pt0.x; let dy2 = pt2.y - pt0.y;
            return (dx1 * dx2 + dy1 * dy2) / Math.sqrt((dx1 * dx1 + dy1 * dy1) * (dx2 * dx2 + dy2 * dy2) + 1e-10);
        }

        // New Euclidean distance function for squareness check
        function getDistance(pt1, pt2) {
            return Math.sqrt(Math.pow(pt2.x - pt1.x, 2) + Math.pow(pt2.y - pt1.y, 2));
        }

        self.onmessage = function(e) {
            const data = e.data;
            if (data.type === 'init') {
                try {
                    self.importScripts(data.url);
                } catch (err) {
                    let errorMsg = err instanceof Error ? err.message : String(err);
                    self.postMessage({ type: 'error', error: errorMsg });
                }
            }
            else if (data.type === 'process') {
                if (!self.cv || !self.cv.Mat) {
                    self.postMessage({ type: 'error', error: 'CV Not Loaded Yet' });
                    return;
                }

                // UNPACK NEW TOLERANCE THRESHOLD
                const {
                    width, height, buffer, scaleFactor,
                    morphThresh, morphKernelSize, cosineThresh,
                    contrastBoost, minAreaPct, maxAreaPct, processRes,
                    maxVariance, squareTolerance
                } = data;

                try {
                    if (!proxySrc || proxySrc.cols !== width || proxySrc.rows !== height) {
                        if (proxySrc) {
                            proxySrc.delete(); proxyGray.delete();
                            dilateKernel.delete();
                            contours.delete(); hierarchy.delete(); approx.delete(); cornersFloat.delete();
                            p0.delete(); p1.delete(); st.delete(); err.delete();
                            if (morphKernel) morphKernel.delete();
                        }
                        proxySrc = new cv.Mat(height, width, cv.CV_8UC4);
                        proxyGray = new cv.Mat(height, width, cv.CV_8UC1);
                        dilateKernel = cv.Mat.ones(2, 2, cv.CV_8U);
                        contours = new cv.MatVector();
                        hierarchy = new cv.Mat();
                        approx = new cv.Mat();
                        cornersFloat = new cv.Mat(4, 1, cv.CV_32FC2);
                        p0 = new cv.Mat();
                        p1 = new cv.Mat();
                        st = new cv.Mat();
                        err = new cv.Mat();
                    }

                    let scaleRatio = height / processRes;
                    if (scaleRatio < 1.0) scaleRatio = 1.0;
                    let dWidth = Math.round(width / scaleRatio);
                    let dHeight = Math.round(height / scaleRatio);

                    if (!downscaledSrc || downscaledSrc.cols !== dWidth || downscaledSrc.rows !== dHeight) {
                        if (downscaledSrc) {
                            downscaledSrc.delete(); downscaledGray.delete();
                            tempGray.delete(); proxyEdges.delete();
                        }
                        downscaledSrc = new cv.Mat(dHeight, dWidth, cv.CV_8UC4);
                        downscaledGray = new cv.Mat(dHeight, dWidth, cv.CV_8UC1);
                        tempGray = new cv.Mat(dHeight, dWidth, cv.CV_8UC1);
                        proxyEdges = new cv.Mat(dHeight, dWidth, cv.CV_8UC1);
                    }

                    proxySrc.data.set(new Uint8Array(buffer));
                    cv.cvtColor(proxySrc, proxyGray, cv.COLOR_RGBA2GRAY, 0);

                    let detectedPaintings = [];

                    let needsGlobalScan = forceGlobalScan || trackedShapes.length === 0 || framesSinceLastScan > 60;

                    if (needsGlobalScan) {
                        let dsize = new cv.Size(dWidth, dHeight);
                        cv.resize(proxySrc, downscaledSrc, dsize, 0, 0, cv.INTER_AREA);

                        cv.cvtColor(downscaledSrc, downscaledGray, cv.COLOR_RGBA2GRAY, 0);

                        let clahe = new cv.CLAHE(3.0, new cv.Size(8, 8)); // You can expose 3.0 to your debug menu
                        clahe.apply(downscaledGray, downscaledGray);
                        clahe.delete();

                        try {
                            cv.bilateralFilter(downscaledGray, tempGray, 9, 75, 75, cv.BORDER_DEFAULT);
                            tempGray.copyTo(downscaledGray);
                        } catch (err) { cv.GaussianBlur(downscaledGray, downscaledGray, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT); }

                        if (currentMorphKernelSize !== morphKernelSize) {
                            if (morphKernel) morphKernel.delete();
                            morphKernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(morphKernelSize, morphKernelSize));
                            currentMorphKernelSize = morphKernelSize;
                        }

                        cv.morphologyEx(downscaledGray, proxyEdges, cv.MORPH_GRADIENT, morphKernel);
                        cv.threshold(proxyEdges, proxyEdges, morphThresh, 255, cv.THRESH_BINARY);
                        cv.dilate(proxyEdges, proxyEdges, dilateKernel, new cv.Point(-1, -1), 1, cv.BORDER_CONSTANT, cv.morphologyDefaultBorderValue());

                        cv.findContours(proxyEdges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                        let possibleShapes = [];
                        let totalCanvasArea = dWidth * dHeight;
                        let minAreaPx = totalCanvasArea * (minAreaPct / 100.0);
                        let maxAreaPx = totalCanvasArea * (maxAreaPct / 100.0);

                        for (let i = 0; i < contours.size(); ++i) {
                            let area = cv.contourArea(contours.get(i));
                            if (area > minAreaPx && area < maxAreaPx) {
                                possibleShapes.push({ idx: i, area: area });
                            }
                        }
                        possibleShapes.sort((a, b) => b.area - a.area);

                        for (let k = 0; k < Math.min(15, possibleShapes.length); k++) {
                            let cnt = contours.get(possibleShapes[k].idx);
                            let peri = cv.arcLength(cnt, true); let eps = 0.02; let found4Corners = false;

                            while (eps <= 0.15) {
                                cv.approxPolyDP(cnt, approx, eps * peri, true);
                                if (approx.rows === 4 && cv.isContourConvex(approx)) {
                                    let maxCosine = 0; let pts = [];
                                    for (let j = 0; j < 4; j++) pts.push({ x: approx.data32S[j * 2], y: approx.data32S[j * 2 + 1] });

                                    for (let j = 2; j < 5; j++) {
                                        let cosine = Math.abs(getAngle(pts[j % 4], pts[j - 2], pts[j - 1]));
                                        maxCosine = Math.max(maxCosine, cosine);
                                    }

                                    // MATHEMATICAL SQUARENESS CHECK (Length Ratios)
                                    let d1 = getDistance(pts[0], pts[1]);
                                    let d2 = getDistance(pts[1], pts[2]);
                                    let d3 = getDistance(pts[2], pts[3]);
                                    let d4 = getDistance(pts[3], pts[0]);
                                    let maxSide = Math.max(d1, d2, d3, d4);
                                    let minSide = Math.min(d1, d2, d3, d4);
                                    let ratio = maxSide / (minSide + 1e-5);

                                    // Only accept if both the angles and side lengths pass the threshold
                                    if (maxCosine <= cosineThresh && ratio <= squareTolerance) {
                                        found4Corners = true; break;
                                    }
                                }
                                eps += 0.01;
                            }

                            if (found4Corners) {
                                let preciseCorners = []; let rawIntBox = [];
                                try {
                                    for (let i = 0; i < 8; i++) cornersFloat.data32F[i] = approx.data32S[i] * scaleRatio;
                                    let winSize = new cv.Size(5, 5); let zeroZone = new cv.Size(-1, -1); let criteria = new cv.TermCriteria(3, 30, 0.001);

                                    cv.cornerSubPix(proxyGray, cornersFloat, winSize, zeroZone, criteria);

                                    for (let i = 0; i < 8; i++) {
                                        preciseCorners.push(cornersFloat.data32F[i] / scaleFactor);
                                        rawIntBox.push(Math.round(cornersFloat.data32F[i] / scaleFactor));
                                    }
                                } catch (subErr) {
                                    preciseCorners = [];
                                    for (let i = 0; i < 8; i++) {
                                        let scaledVal = approx.data32S[i] * scaleRatio;
                                        preciseCorners.push(scaledVal / scaleFactor);
                                        rawIntBox.push(Math.round(scaledVal / scaleFactor));
                                    }
                                }
                                preciseCorners = sortCornersClockwise(preciseCorners);
                                let cx = 0, cy = 0;
                                for(let i=0; i<4; i++){ cx += preciseCorners[i*2]; cy += preciseCorners[i*2+1]; }
                                cx /= 4; cy /= 4;

                                let pXs = [rawIntBox[0] * scaleFactor, rawIntBox[2] * scaleFactor, rawIntBox[4] * scaleFactor, rawIntBox[6] * scaleFactor];
                                let pYs = [rawIntBox[1] * scaleFactor, rawIntBox[3] * scaleFactor, rawIntBox[5] * scaleFactor, rawIntBox[7] * scaleFactor];

                                let roiX = Math.max(0, Math.round(Math.min(...pXs)));
                                let roiY = Math.max(0, Math.round(Math.min(...pYs)));
                                let roiW = Math.min(width - roiX, Math.round(Math.max(...pXs)) - roiX);
                                let roiH = Math.min(height - roiY, Math.round(Math.max(...pYs)) - roiY);

                                let variance = 0;
                                if (roiW > 5 && roiH > 5) {
                                    let rect = new cv.Rect(roiX, roiY, roiW, roiH);
                                    let roi = proxyGray.roi(rect);

                                    let lap = new cv.Mat();
                                    cv.Laplacian(roi, lap, cv.CV_64F);

                                    let mean = new cv.Mat();
                                    let stddev = new cv.Mat();
                                    cv.meanStdDev(lap, mean, stddev);

                                    variance = stddev.data64F[0] * stddev.data64F[0];
                                    roi.delete(); lap.delete(); mean.delete(); stddev.delete();
                                }

                                if (variance > 0 && variance <= maxVariance) {
                                    let highResArea = possibleShapes[k].area * scaleRatio * scaleRatio;
                                    detectedPaintings.push({ preciseCorners: preciseCorners, rawIntBox: rawIntBox, cx: cx, cy: cy, area: highResArea });
                                }
                            }
                            cnt.delete();
                        }

                        trackedShapes = detectedPaintings;
                        forceGlobalScan = false;
                        framesSinceLastScan = 0;

                        if (prevGray) prevGray.delete();
                        prevGray = proxyGray.clone();

                    } else {
                        if (prevGray && trackedShapes.length > 0) {
                            if (p0.rows !== trackedShapes.length * 4) {
                                p0.delete();
                                p0 = new cv.Mat(trackedShapes.length * 4, 1, cv.CV_32FC2);
                            }
                            for (let s = 0; s < trackedShapes.length; s++) {
                                for (let i = 0; i < 4; i++) {
                                    p0.data32F[(s * 4 + i) * 2] = trackedShapes[s].preciseCorners[i * 2] * scaleFactor;
                                    p0.data32F[(s * 4 + i) * 2 + 1] = trackedShapes[s].preciseCorners[i * 2 + 1] * scaleFactor;
                                }
                            }

                            let winSize = new cv.Size(21, 21), maxLevel = 2;
                            let criteria = new cv.TermCriteria(3, 10, 0.03);

                            try {
                                cv.calcOpticalFlowPyrLK(prevGray, proxyGray, p0, p1, st, err, winSize, maxLevel, criteria);
                                let newlyTracked = [];

                                let lostPoints = 0;
                                let maxErr = 0;
                                for (let i = 0; i < st.rows; i++) {
                                    if (st.data[i] === 0) lostPoints++;
                                    else if (err.data32F[i] > maxErr) maxErr = err.data32F[i];
                                }
                                if (lostPoints > 0 || maxErr > 15.0) forceGlobalScan = true;

                                for (let s = 0; s < trackedShapes.length; s++) {
                                    let shapeOk = true; let newCorners = [];
                                    for (let i = 0; i < 4; i++) {
                                        if (st.data[s * 4 + i] === 0) { shapeOk = false; break; }
                                        newCorners.push(p1.data32F[(s * 4 + i) * 2] / scaleFactor);
                                        newCorners.push(p1.data32F[(s * 4 + i) * 2 + 1] / scaleFactor);
                                    }
                                    if (shapeOk) {
                                        let sortedCorners = sortCornersClockwise(newCorners);
                                        let cx = 0, cy = 0, xs = [], ys = [];
                                        for(let i=0; i<4; i++){ cx += sortedCorners[i*2]; cy += sortedCorners[i*2+1]; xs.push(sortedCorners[i*2]); ys.push(sortedCorners[i*2+1]); }
                                        cx /= 4; cy /= 4;
                                        let rawIntBox = [ Math.round(Math.min(...xs)), Math.round(Math.min(...ys)), Math.round(Math.max(...xs)), Math.round(Math.min(...ys)), Math.round(Math.max(...xs)), Math.round(Math.max(...ys)), Math.round(Math.min(...xs)), Math.round(Math.max(...ys)) ];
                                        newlyTracked.push({ preciseCorners: sortedCorners, rawIntBox: rawIntBox, cx: cx, cy: cy, area: trackedShapes[s].area });
                                    }
                                }
                                detectedPaintings = newlyTracked; trackedShapes = newlyTracked;
                            } catch (ofErr) { trackedShapes = []; detectedPaintings = []; forceGlobalScan = true; }

                            framesSinceLastScan++;
                            if (prevGray) prevGray.delete();
                            prevGray = proxyGray.clone();
                        }
                    }
                    frameCount++;
                    self.postMessage({ type: 'result', shapes: detectedPaintings });
                } catch (err) {
                    let errorMsg = err instanceof Error ? err.message : String(err);
                    self.postMessage({ type: 'error', error: errorMsg });
                }
            }
        };
    </script>

    <!-- ======================================================== -->
    <!-- WORKER 2: ONNX AI INFERENCE                              -->
    <!-- ======================================================== -->
    <script id="ai-worker" type="javascript/worker">
        let ortSession = null;
        let classMapping = {};

        self.onmessage = async function(e) {
            const data = e.data;

            if (data.type === 'init') {
                try {
                    self.importScripts('https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js');

                    const mapRes = await fetch(data.origin + '/class_mapping.json');
                    const rawMapping = await mapRes.json();
                    for (let key in rawMapping) { classMapping[parseInt(key)] = rawMapping[key]; }

                    ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/';
                    ort.env.wasm.numThreads = 1;
                    ort.env.wasm.simd = false;

                    const modelUrl = data.origin + '/paintings_fp32.with_runtime_opt.ort';

                    const checkRes = await fetch(modelUrl, { method: 'HEAD' });
                    if (!checkRes.ok) throw new Error(`HTTP ${checkRes.status}: Model file missing!`);

                    const sessionOptions = {
                        executionProviders: ['wasm'],
                        graphOptimizationLevel: 'disabled',
                        logSeverityLevel: 3
                    };

                    ortSession = await ort.InferenceSession.create(modelUrl, sessionOptions);

                    self.postMessage({ type: 'ready', threads: 1 });
                } catch (err) {
                    let errorMsg = err instanceof Error ? err.message : String(err);
                    self.postMessage({ type: 'error', error: String(errorMsg).substring(0, 50) });
                }
            }
            else if (data.type === 'infer') {
                if (!ortSession) return;
                try {
                    const { buffer, width, height, pendingId, rect, cx, cy, area } = data;
                    const float32Data = new Float32Array(3 * width * height);
                    const mean = [0.485, 0.456, 0.406];
                    const std = [0.229, 0.224, 0.225];
                    const imgData = new Uint8ClampedArray(buffer);
                    for (let i = 0; i < width * height; i++) {
                        let r = imgData[i * 4] / 255.0;
                        let g = imgData[i * 4 + 1] / 255.0;
                        let b = imgData[i * 4 + 2] / 255.0;
                        float32Data[i] = (r - mean[0]) / std[0];
                        float32Data[width * height + i] = (g - mean[1]) / std[1];
                        float32Data[2 * width * height + i] = (b - mean[2]) / std[2];
                    }
                    const tensor = new ort.Tensor('float32', float32Data, [1, 3, width, height]);
                    const feeds = {}; feeds[ortSession.inputNames[0]] = tensor;
                    const results = await ortSession.run(feeds);
                    const output = results[ortSession.outputNames[0]].data;
                    const maxVal = Math.max(...output);
                    const expOut = output.map(x => Math.exp(x - maxVal));
                    const sumExp = expOut.reduce((a, b) => a + b, 0);
                    const probabilities = expOut.map(x => x / sumExp);
                    const maxProb = Math.max(...probabilities);
                    const classIdx = probabilities.indexOf(maxProb);
                    const paintingName = classMapping[classIdx] || "Unknown_Painting";
                    self.postMessage({
                        type: 'result', pendingId: pendingId, rect: rect, cx: cx, cy: cy, area: area, maxProb: maxProb, paintingName: paintingName
                    });
                } catch (err) {
                    self.postMessage({ type: 'error', error: String(err).substring(0, 50), pendingId: data.pendingId });
                }
            }
        };
    </script>

    <!-- ======================================================== -->
    <!-- MAIN THREAD (UI, CAMERA, AND ROUTING)                    -->
    <!-- ======================================================== -->
    <script>
        const video = document.getElementById('webcam');
        const trackingContainer = document.getElementById('tracking-container');
        const videoContainer = document.getElementById('video-container');

        const cvCanvas = document.getElementById('cv-canvas'); const cvCtx = cvCanvas.getContext('2d');
        const proxyCanvas = document.getElementById('proxy-canvas'); const proxyCtx = proxyCanvas.getContext('2d', { willReadFrequently: true });
        const aiCanvas = document.getElementById('ai-canvas'); const aiCtx = aiCanvas.getContext('2d', { willReadFrequently: true });

        let activeTrackers = []; let pendingAIAreas = []; let failedScans = []; let candidateShapes = [];
        let isWorkerBusy = false;

        let cvWorker = null;
        let aiWorker = null;

        const MAX_MISSING_FRAMES = 10; const SCALE_FACTOR = 0.5; const SMOOTHING_FACTOR = 0.6;

        document.getElementById('debug-toggle').addEventListener('click', () => {
            const panel = document.getElementById('debug-panel');
            panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        });

        function getIoU(r1, r2) {
            let xA = Math.max(r1.x, r2.x); let yA = Math.max(r1.y, r2.y);
            let xB = Math.min(r1.x + r1.width, r2.x + r2.width); let yB = Math.min(r1.y + r1.height, r2.y + r2.height);
            let interArea = Math.max(0, xB - xA) * Math.max(0, yB - yA);
            return interArea / ((r1.width * r1.height) + (r2.width * r2.height) - interArea);
        }

        function resizeContainer() {
            if (video.videoWidth === 0) return;
            const scale = Math.max(window.innerWidth / video.videoWidth, window.innerHeight / video.videoHeight);
            const scaledW = video.videoWidth * scale; const scaledH = video.videoHeight * scale;
            trackingContainer.style.width = video.videoWidth + "px"; trackingContainer.style.height = video.videoHeight + "px";
            trackingContainer.style.transform = `translate(${(window.innerWidth - scaledW) / 2}px, ${(window.innerHeight - scaledH) / 2}px) scale(${scale})`;
            cvCanvas.width = video.videoWidth; cvCanvas.height = video.videoHeight;
        }

        window.addEventListener('resize', resizeContainer);

        function initAI() {
            document.getElementById('ai-debug').innerText = "Booting AI Worker...";
            const blob = new Blob([document.getElementById('ai-worker').textContent], { type: "text/javascript" });
            aiWorker = new Worker(window.URL.createObjectURL(blob));

            aiWorker.onmessage = (e) => {
                if (e.data.type === 'ready') {
                    document.getElementById('ai-debug').innerText = `AI Ready (${e.data.threads} Threads)`;
                } else if (e.data.type === 'result') {
                    handleAIResult(e.data);
                } else if (e.data.type === 'error') {
                    const safeErr = e.data.error ? String(e.data.error).substring(0, 30) : "Unknown Crash";
                    document.getElementById('ai-debug').innerText = "Err: " + safeErr;
                    if (e.data.pendingId) pendingAIAreas = pendingAIAreas.filter(p => p.id !== e.data.pendingId);
                }
            };

            const cpuCores = window.crossOriginIsolated ? Math.min(navigator.hardwareConcurrency || 4, 4) : 1;
            aiWorker.postMessage({ type: 'init', origin: window.location.origin, cpuCores: cpuCores });
        }

        function initWorker() {
            const blob = new Blob([document.getElementById('cv-worker').textContent], { type: "text/javascript" });
            cvWorker = new Worker(window.URL.createObjectURL(blob));
            cvWorker.onmessage = (e) => {
                if (e.data.type === 'ready') {
                    document.getElementById('worker-status').innerText = "ONLINE";
                }
                else if (e.data.type === 'result') {
                    document.getElementById('worker-status').innerText = "SCANNING";
                    handleWorkerResults(e.data.shapes);
                    isWorkerBusy = false;
                }
                else if (e.data.type === 'error') {
                    console.warn("CV Worker Error:", e.data.error);
                    document.getElementById('worker-status').innerText = "CV Error";
                    isWorkerBusy = false;
                }
            };
            cvWorker.postMessage({ type: 'init', url: window.location.origin + '/opencv.js' });
        }

        document.getElementById('start-btn').addEventListener('click', async () => {
            if (!navigator.mediaDevices) return alert("HTTPS required");
            document.getElementById('start-overlay').style.display = 'none';

            initWorker();
            initAI();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream; video.play();
            } catch (err) { return alert("Camera error."); }

            const checkDim = setInterval(() => {
                if (video.videoWidth > 0) {
                    clearInterval(checkDim);
                    cvCanvas.width = video.videoWidth; cvCanvas.height = video.videoHeight;
                    proxyCanvas.width = Math.round(video.videoWidth * SCALE_FACTOR); proxyCanvas.height = Math.round(video.videoHeight * SCALE_FACTOR);
                    resizeContainer(); requestAnimationFrame(mainLoop);
                }
            }, 50);
        });

        let lastFrameTime = 0; const FPS_LIMIT = 1000 / 30;

        function mainLoop(timestamp) {
            if (!timestamp) timestamp = performance.now();
            if (timestamp - lastFrameTime < FPS_LIMIT) { requestAnimationFrame(mainLoop); return; }
            lastFrameTime = timestamp;

            if (video.readyState >= 2 && !isWorkerBusy) {
                isWorkerBusy = true;

                // Added 120p to the array map
                const resMap = [120, 240, 480, 720, 1080];
                const processRes = resMap[parseInt(document.getElementById('inp-resolution').value)];

                const contrastBoost = parseFloat(document.getElementById('inp-contrast').value);
                const morphThresh = parseInt(document.getElementById('inp-morph-thresh').value);
                const morphKernelSize = parseInt(document.getElementById('inp-morph-kernel').value);
                const cosineThresh = parseFloat(document.getElementById('inp-cosine').value);
                const minAreaPct = parseFloat(document.getElementById('inp-min-area').value);
                const maxAreaPct = parseFloat(document.getElementById('inp-max-area').value);
                const maxVariance = parseInt(document.getElementById('inp-variance').value);

                // NEW: AI Crop Percentage & Square Tolerance
                const aiCropPct = parseInt(document.getElementById('inp-ai-crop').value);
                const squareTolerance = parseFloat(document.getElementById('inp-square-tol').value);

                document.getElementById('lbl-resolution').innerText = processRes + "p";
                document.getElementById('lbl-contrast').innerText = contrastBoost.toFixed(1);
                document.getElementById('lbl-morph-thresh').innerText = morphThresh;
                document.getElementById('lbl-morph-kernel').innerText = morphKernelSize;
                document.getElementById('lbl-cosine').innerText = cosineThresh.toFixed(2);
                document.getElementById('lbl-min-area').innerText = minAreaPct.toFixed(1);
                document.getElementById('lbl-max-area').innerText = maxAreaPct;
                document.getElementById('lbl-variance').innerText = maxVariance;
                document.getElementById('lbl-ai-crop').innerText = aiCropPct;
                document.getElementById('lbl-square-tol').innerText = squareTolerance.toFixed(2);

                proxyCtx.drawImage(video, 0, 0, proxyCanvas.width, proxyCanvas.height);
                let imgData = proxyCtx.getImageData(0, 0, proxyCanvas.width, proxyCanvas.height);

                cvWorker.postMessage({
                    type: 'process',
                    width: proxyCanvas.width,
                    height: proxyCanvas.height,
                    buffer: imgData.data.buffer,
                    scaleFactor: SCALE_FACTOR,
                    contrastBoost: contrastBoost,
                    morphThresh: morphThresh,
                    morphKernelSize: morphKernelSize,
                    cosineThresh: cosineThresh,
                    minAreaPct: minAreaPct,
                    maxAreaPct: maxAreaPct,
                    processRes: processRes,
                    maxVariance: maxVariance,
                    squareTolerance: squareTolerance
                }, [imgData.data.buffer]);
            }

            for (let i = activeTrackers.length - 1; i >= 0; i--) {
                if (!activeTrackers[i].updatedThisFrame) {
                    activeTrackers[i].lostFrames++;
                    if (activeTrackers[i].lostFrames > 5) activeTrackers[i].vidEl.style.opacity = 0.3;

                    if (activeTrackers[i].lostFrames > MAX_MISSING_FRAMES) {
                        activeTrackers[i].vidEl.pause();
                        activeTrackers[i].vidEl.removeAttribute('src');
                        activeTrackers[i].vidEl.load();
                        activeTrackers[i].vidEl.remove();

                        activeTrackers.splice(i, 1);
                        document.getElementById('track-count').innerText = activeTrackers.length;
                    }
                }
            }
            requestAnimationFrame(mainLoop);
        }

        function handleWorkerResults(shapes) {
            activeTrackers.forEach(t => t.updatedThisFrame = false); candidateShapes.forEach(c => c.updatedThisFrame = false);
            cvCtx.clearRect(0, 0, cvCanvas.width, cvCanvas.height); failedScans = failedScans.filter(f => Date.now() - f.time < 5000);

            for (let shape of shapes) {
                let xs = [shape.rawIntBox[0], shape.rawIntBox[2], shape.rawIntBox[4], shape.rawIntBox[6]]; let ys = [shape.rawIntBox[1], shape.rawIntBox[3], shape.rawIntBox[5], shape.rawIntBox[7]];
                shape.rect = { x: Math.min(...xs), y: Math.min(...ys), width: Math.max(...xs) - Math.min(...xs), height: Math.max(...ys) - Math.min(...ys) };

                cvCtx.beginPath(); cvCtx.moveTo(shape.preciseCorners[0], shape.preciseCorners[1]); cvCtx.lineTo(shape.preciseCorners[2], shape.preciseCorners[3]); cvCtx.lineTo(shape.preciseCorners[4], shape.preciseCorners[5]); cvCtx.lineTo(shape.preciseCorners[6], shape.preciseCorners[7]); cvCtx.closePath(); cvCtx.lineWidth = 4; cvCtx.strokeStyle = 'lime'; cvCtx.stroke();
                cvCtx.fillStyle = 'blue'; for(let i = 0; i < 4; i++) { cvCtx.beginPath(); cvCtx.arc(shape.preciseCorners[i*2], shape.preciseCorners[i*2+1], 6, 0, 2 * Math.PI); cvCtx.fill(); }

                let matchedTracker = activeTrackers.find(t => getIoU(shape.rect, t.rect) > 0.6);

                if (matchedTracker) {
                    matchedTracker.rect = shape.rect; matchedTracker.cx = shape.cx; matchedTracker.cy = shape.cy; matchedTracker.area = shape.area; matchedTracker.lostFrames = 0; matchedTracker.updatedThisFrame = true; matchedTracker.vidEl.style.opacity = 0.95;
                    if (!matchedTracker.smoothedCorners) { matchedTracker.smoothedCorners = [...shape.preciseCorners]; }
                    else { for (let i = 0; i < 8; i++) matchedTracker.smoothedCorners[i] = (shape.preciseCorners[i] * SMOOTHING_FACTOR) + (matchedTracker.smoothedCorners[i] * (1.0 - SMOOTHING_FACTOR)); }
                    if (matchedTracker.vidEl.dataset.ready === 'true') { matchedTracker.vidEl.style.display = 'block'; applyCSSMatrix(matchedTracker.smoothedCorners, video.videoWidth, video.videoHeight, matchedTracker.vidEl); }
                } else {
                    let isAlreadyPending = pendingAIAreas.some(p => getIoU(shape.rect, p.rect) > 0.6); let isFailedRecently = failedScans.some(f => getIoU(shape.rect, f.rect) > 0.6);

                    if (!isAlreadyPending && !isFailedRecently) {
                        let matchedCandidate = candidateShapes.find(c => getIoU(shape.rect, c.rect) > 0.6);
                        if (matchedCandidate) {
                            matchedCandidate.frames++; matchedCandidate.rect = shape.rect; matchedCandidate.updatedThisFrame = true;
                            if (matchedCandidate.frames >= 3) {
                                let pendingId = Date.now() + Math.random();
                                pendingAIAreas.push({ id: pendingId, rect: shape.rect });
                                runLocalAIInference(shape.rect, shape.cx, shape.cy, shape.area, pendingId);
                                matchedCandidate.sentToAI = true;
                            }
                        } else candidateShapes.push({ rect: shape.rect, frames: 1, updatedThisFrame: true, sentToAI: false });
                    }
                }
            }
            candidateShapes = candidateShapes.filter(c => c.updatedThisFrame && !c.sentToAI);
        }

        function runLocalAIInference(rect, cx, cy, areaSignature, pendingId) {
            if (rect.width <= 0 || rect.height <= 0 || !aiWorker) {
                pendingAIAreas = pendingAIAreas.filter(p => p.id !== pendingId); return;
            }

            // --- THE INWARD AI CROP ---
            const cropPct = parseInt(document.getElementById('inp-ai-crop').value) / 100.0;
            const marginX = rect.width * cropPct;
            const marginY = rect.height * cropPct;

            const cropX = rect.x + marginX;
            const cropY = rect.y + marginY;
            const cropW = rect.width - (marginX * 2);
            const cropH = rect.height - (marginY * 2);

            aiCtx.clearRect(0, 0, 224, 224);
            aiCtx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, 224, 224);
            let imageData = aiCtx.getImageData(0, 0, 224, 224);

            aiWorker.postMessage({
                type: 'infer', buffer: imageData.data.buffer, width: 224, height: 224, pendingId: pendingId, rect: rect, cx: cx, cy: cy, area: areaSignature
            }, [imageData.data.buffer]);
        }

        function handleAIResult(data) {
            const { pendingId, rect, cx, cy, area, maxProb, paintingName } = data;

            document.getElementById('ai-debug').innerText = `${paintingName} (${(maxProb * 100).toFixed(1)}%)`;

            if (maxProb > 0.80 && paintingName !== "Unknown_Painting") {
                if (!activeTrackers.some(t => getIoU(rect, t.rect) > 0.6)) {
                    let newVid = document.createElement('video');
                    newVid.className = 'ar-video-element'; newVid.src = `/videos/${paintingName}.mp4`;
                    newVid.playsInline = true; newVid.autoplay = true; newVid.loop = true; newVid.muted = true;
                    newVid.addEventListener('loadedmetadata', () => { newVid.dataset.ready = 'true'; newVid.play().catch(e => {}); });
                    videoContainer.appendChild(newVid);

                    activeTrackers.push({
                        id: Date.now(),
                        rect: rect, cx: cx, cy: cy, area: area,
                        painting_name: paintingName,
                        vidEl: newVid, lostFrames: 0, updatedThisFrame: true, smoothedCorners: null
                    });
                    document.getElementById('track-count').innerText = activeTrackers.length;
                }
            } else {
                failedScans.push({ rect: rect, time: Date.now() });
            }
            pendingAIAreas = pendingAIAreas.filter(p => p.id !== pendingId);
        }

        function applyCSSMatrix(cornersArray, vidW, vidH, targetVideoEl) {
            const corners = [ { x: cornersArray[0], y: cornersArray[1] }, { x: cornersArray[2], y: cornersArray[3] }, { x: cornersArray[4], y: cornersArray[5] }, { x: cornersArray[6], y: cornersArray[7] } ];
            const arW = targetVideoEl.videoWidth || vidW, arH = targetVideoEl.videoHeight || vidH;
            const transform = calculateCSSMatrix( [0, 0, arW, 0, arW, arH, 0, arH], [corners[0].x, corners[0].y, corners[1].x, corners[1].y, corners[2].x, corners[2].y, corners[3].x, corners[3].y] );
            targetVideoEl.style.width = arW + "px"; targetVideoEl.style.height = arH + "px";
            targetVideoEl.style.transform = `matrix3d(${transform.join(',')})`;
        }

        function calculateCSSMatrix(src, dst) {
            let a = [], b = [];
            for (let i = 0; i < 4; i++) {
                a.push([src[i*2], src[i*2+1], 1, 0, 0, 0, -src[i*2]*dst[i*2], -src[i*2+1]*dst[i*2]]); a.push([0, 0, 0, src[i*2], src[i*2+1], 1, -src[i*2]*dst[i*2+1], -src[i*2+1]*dst[i*2+1]]); b.push(dst[i*2], dst[i*2+1]);
            }
            let h = solveLinearSystem(a, b);
            return [ h[0], h[3], 0, h[6], h[1], h[4], 0, h[7], 0, 0, 1, 0, h[2], h[5], 0, 1 ];
        }

        function solveLinearSystem(a, b) {
            for (let i = 0; i < 8; i++) {
                let pivot = i; for (let j = i + 1; j < 8; j++) if (Math.abs(a[j][i]) > Math.abs(a[pivot][i])) pivot = j;
                [a[i], a[pivot]] = [a[pivot], a[i]]; [b[i], b[pivot]] = [b[pivot], b[i]];
                let p = a[i][i]; for (let j = i; j < 8; j++) a[i][j] /= p; b[i] /= p;
                for (let j = 0; j < 8; j++) { if (j !== i) { let factor = a[j][i]; for (let k = i; k < 8; k++) a[j][k] -= factor * a[i][k]; b[j] -= factor * b[i]; } }
            }
            return b;
        }
    </script>
</body>
