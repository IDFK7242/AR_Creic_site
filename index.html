<!DOCTYPE html>
<html>
<head>
    <title>AR Scanner (ZERO-LATENCY + OPTICAL FLOW)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- Load ONNX Runtime Web securely from the CDN -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #viewport { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: 1; }
        #tracking-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        #webcam, #cv-canvas, #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #cv-canvas { z-index: 10; pointer-events: none; display: block; }
        #video-container { z-index: 15; pointer-events: none; }
        #debug-overlay {
            position: absolute; top: 15px; left: 15px; z-index: 999;
            color: #00FF00; font-family: monospace; font-size: 14px;
            font-weight: bold; text-shadow: 2px 2px 2px #000;
            pointer-events: none;
        }
        .ar-video-element {
            position: absolute; top: 0; left: 0; transform-origin: 0 0;
            box-shadow: 0px 0px 30px rgba(0,0,0,0.9);
            opacity: 0.95; transition: opacity 0.2s ease-in-out; display: none;
        }
        #start-overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #0a0a0a; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { background: #FFF; color: #000; border: none; padding: 16px 36px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s; }
        #start-btn:active { transform: scale(0.95); }
        #proxy-canvas, #ai-canvas { display: none; }
    </style>
</head>
<body>
    <div id="start-overlay">
        <button id="start-btn">Start Advanced AR Tracker</button>
    </div>

    <div id="debug-overlay">
        Worker: <span id="worker-status">Booting...</span><br>
        Tracked: <span id="track-count">0</span><br>
        AI Log: <span id="ai-debug">Waiting for Model...</span>
    </div>

    <div id="viewport">
        <div id="tracking-container">
            <video id="webcam" autoplay muted playsinline></video>
            <canvas id="cv-canvas"></canvas>
            <div id="video-container"></div>
        </div>
    </div>

    <canvas id="proxy-canvas"></canvas>
    <canvas id="ai-canvas" width="224" height="224"></canvas>

    <!-- ======================================================== -->
    <!-- BACKGROUND WEB WORKER (OPTICAL FLOW + CONTOURS)          -->
    <!-- ======================================================== -->
    <script id="cv-worker" type="javascript/worker">
        self.Module = {
            onRuntimeInitialized: function() {
                self.postMessage({ type: 'ready' });
            }
        };

        let cvLoaded = false;
        let prevGray = null;
        let trackedShapes = [];
        let frameCount = 0;

        function sortCornersClockwise(ptsArray) {
            let pts = [];
            let cx = 0, cy = 0;
            for (let i = 0; i < 4; i++) {
                pts.push({ x: ptsArray[i*2], y: ptsArray[i*2+1] });
                cx += ptsArray[i*2]; cy += ptsArray[i*2+1];
            }
            cx /= 4; cy /= 4;
            pts.sort((a, b) => { return Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx); });
            let sorted = [];
            for (let i = 0; i < 4; i++) { sorted.push(pts[i].x, pts[i].y); }
            return sorted;
        }

        function getAngle(pt1, pt2, pt0) {
            let dx1 = pt1.x - pt0.x; let dy1 = pt1.y - pt0.y;
            let dx2 = pt2.x - pt0.x; let dy2 = pt2.y - pt0.y;
            return (dx1 * dx2 + dy1 * dy2) / Math.sqrt((dx1 * dx1 + dy1 * dy1) * (dx2 * dx2 + dy2 * dy2) + 1e-10);
        }

        self.onmessage = function(e) {
            const data = e.data;
            if (data.type === 'init') {
                self.importScripts(data.url);
                let checkInterval = setInterval(() => {
                    if (self.cv && self.cv.Mat && !cvLoaded) {
                        cvLoaded = true;
                        clearInterval(checkInterval);
                        self.postMessage({ type: 'ready' });
                    }
                }, 100);
            }
            else if (data.type === 'process') {
                if (!self.cv || !self.cv.Mat) return;

                const { width, height, buffer, scaleFactor } = data;
                let proxySrc = null, proxyGray = null, proxyEdges = null;

                try {
                    proxySrc = new cv.Mat(height, width, cv.CV_8UC4);
                    proxySrc.data.set(new Uint8Array(buffer));
                    proxyGray = new cv.Mat();
                    cv.cvtColor(proxySrc, proxyGray, cv.COLOR_RGBA2GRAY, 0);

                    let detectedPaintings = [];

                    // --- FULL SCAN EVERY 10 FRAMES OR IF WE LOST TRACK ---
                    if (frameCount % 10 === 0 || trackedShapes.length === 0) {
                        proxyEdges = new cv.Mat();

                        try {
                            let tempGray = new cv.Mat();
                            cv.bilateralFilter(proxyGray, tempGray, 9, 75, 75, cv.BORDER_DEFAULT);
                            tempGray.copyTo(proxyGray);
                            tempGray.delete();
                        } catch (err) {
                            cv.GaussianBlur(proxyGray, proxyGray, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                        }

                        cv.Canny(proxyGray, proxyEdges, 50, 150, 3, false);
                        let dilateKernel = cv.Mat.ones(2, 2, cv.CV_8U);
                        cv.dilate(proxyEdges, proxyEdges, dilateKernel, new cv.Point(-1, -1), 1, cv.BORDER_CONSTANT, cv.morphologyDefaultBorderValue());
                        dilateKernel.delete();

                        let contours = new cv.MatVector(), hierarchy = new cv.Mat();
                        // Use RETR_EXTERNAL to fix the ghost/duplicate box bug
                        cv.findContours(proxyEdges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                        let possibleShapes = [];
                        let maxArea = width * height * 0.5;

                        for (let i = 0; i < contours.size(); ++i) {
                            let area = cv.contourArea(contours.get(i));
                            if (area > (800 * scaleFactor * scaleFactor) && area < maxArea) {
                                possibleShapes.push({ idx: i, area: area });
                            }
                        }
                        possibleShapes.sort((a, b) => b.area - a.area);

                        for (let k = 0; k < Math.min(15, possibleShapes.length); k++) {
                            let cnt = contours.get(possibleShapes[k].idx);
                            let approx = new cv.Mat();
                            let peri = cv.arcLength(cnt, true);
                            let eps = 0.01;
                            let found4Corners = false;

                            while (eps <= 0.12) {
                                cv.approxPolyDP(cnt, approx, eps * peri, true);
                                if (approx.rows === 4 && cv.isContourConvex(approx)) {
                                    let maxCosine = 0;
                                    let pts = [];
                                    for (let j = 0; j < 4; j++) pts.push({ x: approx.data32S[j * 2], y: approx.data32S[j * 2 + 1] });
                                    for (let j = 2; j < 5; j++) {
                                        let cosine = Math.abs(getAngle(pts[j % 4], pts[j - 2], pts[j - 1]));
                                        maxCosine = Math.max(maxCosine, cosine);
                                    }
                                    if (maxCosine <= 0.174) { found4Corners = true; break; }
                                }
                                eps += 0.01;
                            }

                            if (found4Corners) {
                                let preciseCorners = []; let rawIntBox = [];
                                try {
                                    let cornersFloat = new cv.Mat(4, 1, cv.CV_32FC2);
                                    for (let i = 0; i < 8; i++) cornersFloat.data32F[i] = approx.data32S[i];
                                    let winSize = new cv.Size(5, 5); let zeroZone = new cv.Size(-1, -1); let criteria = new cv.TermCriteria(3, 30, 0.001);
                                    cv.cornerSubPix(proxyGray, cornersFloat, winSize, zeroZone, criteria);
                                    for (let i = 0; i < 8; i++) {
                                        preciseCorners.push(cornersFloat.data32F[i] / scaleFactor);
                                        rawIntBox.push(Math.round(cornersFloat.data32F[i] / scaleFactor));
                                    }
                                    cornersFloat.delete();
                                } catch (subErr) {
                                    preciseCorners = [];
                                    for (let i = 0; i < 8; i++) {
                                        preciseCorners.push(approx.data32S[i] / scaleFactor);
                                        rawIntBox.push(Math.round(approx.data32S[i] / scaleFactor));
                                    }
                                }

                                preciseCorners = sortCornersClockwise(preciseCorners);
                                let cx = 0, cy = 0;
                                for(let i=0; i<4; i++){ cx += preciseCorners[i*2]; cy += preciseCorners[i*2+1]; }
                                cx /= 4; cy /= 4;

                                detectedPaintings.push({ preciseCorners: preciseCorners, rawIntBox: rawIntBox, cx: cx, cy: cy, area: possibleShapes[k].area });
                            }
                            approx.delete();
                        }
                        contours.delete(); hierarchy.delete();
                        trackedShapes = detectedPaintings;

                        if (prevGray) prevGray.delete();
                        prevGray = proxyGray.clone();

                    } else {
                        // --- OPTICAL FLOW (LUCAS-KANADE) ---
                        if (prevGray && trackedShapes.length > 0) {
                            let p0 = new cv.Mat(trackedShapes.length * 4, 1, cv.CV_32FC2);
                            for (let s = 0; s < trackedShapes.length; s++) {
                                for (let i = 0; i < 4; i++) {
                                    p0.data32F[(s * 4 + i) * 2] = trackedShapes[s].preciseCorners[i * 2] * scaleFactor;
                                    p0.data32F[(s * 4 + i) * 2 + 1] = trackedShapes[s].preciseCorners[i * 2 + 1] * scaleFactor;
                                }
                            }

                            let p1 = new cv.Mat(), st = new cv.Mat(), err = new cv.Mat();
                            let winSize = new cv.Size(21, 21), maxLevel = 2;
                            let criteria = new cv.TermCriteria(cv.TERM_CRITERIA_EPS | cv.TERM_CRITERIA_COUNT, 10, 0.03);

                            try {
                                cv.calcOpticalFlowPyrLK(prevGray, proxyGray, p0, p1, st, err, winSize, maxLevel, criteria);
                                let newlyTracked = [];

                                for (let s = 0; s < trackedShapes.length; s++) {
                                    let shapeOk = true;
                                    let newCorners = [];
                                    for (let i = 0; i < 4; i++) {
                                        if (st.data[s * 4 + i] === 0) { shapeOk = false; break; }
                                        newCorners.push(p1.data32F[(s * 4 + i) * 2] / scaleFactor);
                                        newCorners.push(p1.data32F[(s * 4 + i) * 2 + 1] / scaleFactor);
                                    }

                                    if (shapeOk) {
                                        let sortedCorners = sortCornersClockwise(newCorners);
                                        let cx = 0, cy = 0, xs = [], ys = [];
                                        for(let i=0; i<4; i++){
                                            cx += sortedCorners[i*2]; cy += sortedCorners[i*2+1];
                                            xs.push(sortedCorners[i*2]); ys.push(sortedCorners[i*2+1]);
                                        }
                                        cx /= 4; cy /= 4;

                                        let rawIntBox = [
                                            Math.round(Math.min(...xs)), Math.round(Math.min(...ys)),
                                            Math.round(Math.max(...xs)), Math.round(Math.min(...ys)),
                                            Math.round(Math.max(...xs)), Math.round(Math.max(...ys)),
                                            Math.round(Math.min(...xs)), Math.round(Math.max(...ys))
                                        ];

                                        newlyTracked.push({ preciseCorners: sortedCorners, rawIntBox: rawIntBox, cx: cx, cy: cy, area: trackedShapes[s].area });
                                    }
                                }
                                detectedPaintings = newlyTracked;
                                trackedShapes = newlyTracked;
                            } catch (ofErr) {
                                trackedShapes = [];
                                detectedPaintings = [];
                            }

                            p0.delete(); p1.delete(); st.delete(); err.delete();
                            if (prevGray) prevGray.delete();
                            prevGray = proxyGray.clone();
                        }
                    }

                    frameCount++;
                    self.postMessage({ type: 'result', shapes: detectedPaintings });

                } catch (err) { } finally {
                    if (proxySrc) proxySrc.delete();
                    if (proxyGray) proxyGray.delete();
                    if (proxyEdges) proxyEdges.delete();
                }
            }
        };
    </script>

    <!-- ======================================================== -->
    <!-- MAIN THREAD (UI, NATIVE DRAWING, & LOCAL ONNX AI)        -->
    <!-- ======================================================== -->
    <script>
        const video = document.getElementById('webcam');
        const trackingContainer = document.getElementById('tracking-container');
        const videoContainer = document.getElementById('video-container');

        const cvCanvas = document.getElementById('cv-canvas');
        const cvCtx = cvCanvas.getContext('2d');

        const proxyCanvas = document.getElementById('proxy-canvas');
        const proxyCtx = proxyCanvas.getContext('2d', { willReadFrequently: true });

        const aiCanvas = document.getElementById('ai-canvas');
        const aiCtx = aiCanvas.getContext('2d', { willReadFrequently: true });

        let activeTrackers = [];
        let pendingAIAreas = [];
        let failedScans = [];
        let candidateShapes = [];

        let isWorkerBusy = false;
        let cvWorker = null;

        // --- ONNX GLOBALS ---
        let ortSession = null;
        let classMapping = {};

        const MAX_MISSING_FRAMES = 10;
        const SCALE_FACTOR = 0.5;
        const SMOOTHING_FACTOR = 0.6;

        function getIoU(r1, r2) {
            let xA = Math.max(r1.x, r2.x); let yA = Math.max(r1.y, r2.y);
            let xB = Math.min(r1.x + r1.width, r2.x + r2.width); let yB = Math.min(r1.y + r1.height, r2.y + r2.height);
            let interArea = Math.max(0, xB - xA) * Math.max(0, yB - yA);
            return interArea / ((r1.width * r1.height) + (r2.width * r2.height) - interArea);
        }

        function resizeContainer() {
            if (video.videoWidth === 0) return;
            const scale = Math.max(window.innerWidth / video.videoWidth, window.innerHeight / video.videoHeight);
            const scaledW = video.videoWidth * scale; const scaledH = video.videoHeight * scale;
            trackingContainer.style.width = video.videoWidth + "px"; trackingContainer.style.height = video.videoHeight + "px";
            trackingContainer.style.transform = `translate(${(window.innerWidth - scaledW) / 2}px, ${(window.innerHeight - scaledH) / 2}px) scale(${scale})`;
            cvCanvas.width = video.videoWidth; cvCanvas.height = video.videoHeight;
        }

        window.addEventListener('resize', resizeContainer);
/// --- MULTI-THREADED AI INITIALIZATION ---
        async function initAI() {
            document.getElementById('ai-debug').innerText = "Loading AI & Mapping...";
            try {
                const mapRes = await fetch('/class_mapping.json');
                const rawMapping = await mapRes.json();
                for (let key in rawMapping) { classMapping[parseInt(key)] = rawMapping[key]; }

                // 1. Explicitly point ONNX to the secure CDN for the WebAssembly files
                ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/';

                // 2. CHECK IF HEADERS WORKED: Ensure SharedArrayBuffer is unlocked
                if (!window.crossOriginIsolated) {
                    ort.env.wasm.numThreads = 1;
                    console.warn("Security headers failed. Falling back to 1 thread.");
                } else {
                    const cpuCores = navigator.hardwareConcurrency || 4;
                    ort.env.wasm.numThreads = Math.min(cpuCores, 4);
                }

                // 3. Create the session
                ortSession = await ort.InferenceSession.create('/paintings_int8.onnx', { executionProviders: ['wasm'] });

                document.getElementById('ai-debug').innerText = `AI Ready (${ort.env.wasm.numThreads} Threads)`;
            } catch (err) {
                // Print the exact error on the phone screen just in case
                const safeErr = err.message ? err.message.substring(0, 30) : String(err).substring(0, 30);
                document.getElementById('ai-debug').innerText = "Err: " + safeErr;
                console.error("AI Init Error:", err);
            }
        }
        function initWorker() {
            const blob = new Blob([document.getElementById('cv-worker').textContent], { type: "text/javascript" });
            cvWorker = new Worker(window.URL.createObjectURL(blob));
            cvWorker.onmessage = (e) => {
                if (e.data.type === 'ready') {
                    document.getElementById('worker-status').innerText = "ONLINE";
                }
                else if (e.data.type === 'result') {
                    document.getElementById('worker-status').innerText = "SCANNING";
                    handleWorkerResults(e.data.shapes);
                    isWorkerBusy = false;
                }
            };
            cvWorker.postMessage({ type: 'init', url: window.location.origin + '/opencv.js' });
        }

        // --- BUTTON LISTENER (Restored!) ---
        document.getElementById('start-btn').addEventListener('click', async () => {
            if (!navigator.mediaDevices) return alert("HTTPS required");
            document.getElementById('start-overlay').style.display = 'none';

            initWorker();
            await initAI();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream; video.play();
            } catch (err) { return alert("Camera error."); }

            const checkDim = setInterval(() => {
                if (video.videoWidth > 0) {
                    clearInterval(checkDim);
                    cvCanvas.width = video.videoWidth; cvCanvas.height = video.videoHeight;
                    proxyCanvas.width = Math.round(video.videoWidth * SCALE_FACTOR); proxyCanvas.height = Math.round(video.videoHeight * SCALE_FACTOR);
                    resizeContainer(); requestAnimationFrame(mainLoop);
                }
            }, 50);
        });

        let lastFrameTime = 0;
        const FPS_LIMIT = 1000 / 30; // 30 FPS thanks to Optical Flow

        function mainLoop(timestamp) {
            if (!timestamp) timestamp = performance.now();
            if (timestamp - lastFrameTime < FPS_LIMIT) { requestAnimationFrame(mainLoop); return; }
            lastFrameTime = timestamp;

            if (video.readyState >= 2 && !isWorkerBusy) {
                isWorkerBusy = true;
                proxyCtx.drawImage(video, 0, 0, proxyCanvas.width, proxyCanvas.height);
                let imgData = proxyCtx.getImageData(0, 0, proxyCanvas.width, proxyCanvas.height);
                cvWorker.postMessage({ type: 'process', width: proxyCanvas.width, height: proxyCanvas.height, buffer: imgData.data.buffer, scaleFactor: SCALE_FACTOR }, [imgData.data.buffer]);
            }

            for (let i = activeTrackers.length - 1; i >= 0; i--) {
                if (!activeTrackers[i].updatedThisFrame) {
                    activeTrackers[i].lostFrames++;
                    if (activeTrackers[i].lostFrames > 5) activeTrackers[i].vidEl.style.opacity = 0.3;
                    if (activeTrackers[i].lostFrames > MAX_MISSING_FRAMES) {
                        activeTrackers[i].vidEl.remove(); activeTrackers.splice(i, 1);
                        document.getElementById('track-count').innerText = activeTrackers.length;
                    }
                }
            }
            requestAnimationFrame(mainLoop);
        }

        function handleWorkerResults(shapes) {
            activeTrackers.forEach(t => t.updatedThisFrame = false);
            candidateShapes.forEach(c => c.updatedThisFrame = false);
            cvCtx.clearRect(0, 0, cvCanvas.width, cvCanvas.height);
            failedScans = failedScans.filter(f => Date.now() - f.time < 5000);

            for (let shape of shapes) {
                let xs = [shape.rawIntBox[0], shape.rawIntBox[2], shape.rawIntBox[4], shape.rawIntBox[6]];
                let ys = [shape.rawIntBox[1], shape.rawIntBox[3], shape.rawIntBox[5], shape.rawIntBox[7]];
                shape.rect = { x: Math.min(...xs), y: Math.min(...ys), width: Math.max(...xs) - Math.min(...xs), height: Math.max(...ys) - Math.min(...ys) };

                cvCtx.beginPath(); cvCtx.moveTo(shape.preciseCorners[0], shape.preciseCorners[1]); cvCtx.lineTo(shape.preciseCorners[2], shape.preciseCorners[3]);
                cvCtx.lineTo(shape.preciseCorners[4], shape.preciseCorners[5]); cvCtx.lineTo(shape.preciseCorners[6], shape.preciseCorners[7]);
                cvCtx.closePath(); cvCtx.lineWidth = 4; cvCtx.strokeStyle = 'lime'; cvCtx.stroke();
                cvCtx.fillStyle = 'blue';
                for(let i = 0; i < 4; i++) { cvCtx.beginPath(); cvCtx.arc(shape.preciseCorners[i*2], shape.preciseCorners[i*2+1], 6, 0, 2 * Math.PI); cvCtx.fill(); }

                let matchedTracker = activeTrackers.find(t => getIoU(shape.rect, t.rect) > 0.6);

                if (matchedTracker) {
                    matchedTracker.rect = shape.rect; matchedTracker.cx = shape.cx; matchedTracker.cy = shape.cy; matchedTracker.area = shape.area;
                    matchedTracker.lostFrames = 0; matchedTracker.updatedThisFrame = true; matchedTracker.vidEl.style.opacity = 0.95;

                    if (!matchedTracker.smoothedCorners) {
                        matchedTracker.smoothedCorners = [...shape.preciseCorners];
                    } else {
                        for (let i = 0; i < 8; i++) {
                            matchedTracker.smoothedCorners[i] = (shape.preciseCorners[i] * SMOOTHING_FACTOR) + (matchedTracker.smoothedCorners[i] * (1.0 - SMOOTHING_FACTOR));
                        }
                    }

                    if (matchedTracker.vidEl.dataset.ready === 'true') {
                        matchedTracker.vidEl.style.display = 'block';
                        applyCSSMatrix(matchedTracker.smoothedCorners, video.videoWidth, video.videoHeight, matchedTracker.vidEl);
                    }
                } else {
                    let isAlreadyPending = pendingAIAreas.some(p => getIoU(shape.rect, p.rect) > 0.6);
                    let isFailedRecently = failedScans.some(f => getIoU(shape.rect, f.rect) > 0.6);

                    if (!isAlreadyPending && !isFailedRecently) {
                        let matchedCandidate = candidateShapes.find(c => getIoU(shape.rect, c.rect) > 0.6);

                        if (matchedCandidate) {
                            matchedCandidate.frames++; matchedCandidate.rect = shape.rect; matchedCandidate.updatedThisFrame = true;
                            if (matchedCandidate.frames >= 3) {
                                let pendingId = Date.now() + Math.random();
                                pendingAIAreas.push({ id: pendingId, rect: shape.rect });
                                runLocalAIInference(shape.rect, shape.cx, shape.cy, pendingId);
                                matchedCandidate.sentToAI = true;
                            }
                        } else {
                            candidateShapes.push({ rect: shape.rect, frames: 1, updatedThisFrame: true, sentToAI: false });
                        }
                    }
                }
            }
            candidateShapes = candidateShapes.filter(c => c.updatedThisFrame && !c.sentToAI);
        }

        // --- PURE JAVASCRIPT PREPROCESSING (Equivalent to PyTorch transforms) ---
        function preprocessImageData(imageData) {
            const { data, width, height } = imageData;
            const float32Data = new Float32Array(3 * width * height);
            const mean = [0.485, 0.456, 0.406];
            const std = [0.229, 0.224, 0.225];

            for (let i = 0; i < width * height; i++) {
                let r = data[i * 4] / 255.0;
                let g = data[i * 4 + 1] / 255.0;
                let b = data[i * 4 + 2] / 255.0;

                float32Data[i] = (r - mean[0]) / std[0]; // R
                float32Data[width * height + i] = (g - mean[1]) / std[1]; // G
                float32Data[2 * width * height + i] = (b - mean[2]) / std[2]; // B
            }
            return new ort.Tensor('float32', float32Data, [1, 3, width, height]);
        }

        // --- RUN AI LOCALLY IN THE BROWSER ---
        async function runLocalAIInference(rect, cx, cy, pendingId) {
            if (rect.width <= 0 || rect.height <= 0 || !ortSession) {
                pendingAIAreas = pendingAIAreas.filter(p => p.id !== pendingId);
                return;
            }

            aiCtx.clearRect(0, 0, 224, 224);
            aiCtx.drawImage(video, rect.x, rect.y, rect.width, rect.height, 0, 0, 224, 224);
            let imageData = aiCtx.getImageData(0, 0, 224, 224);

            try {
                const tensor = preprocessImageData(imageData);

                const feeds = {};
                feeds[ortSession.inputNames[0]] = tensor;
                const results = await ortSession.run(feeds);
                const output = results[ortSession.outputNames[0]].data;

                const maxVal = Math.max(...output);
                const expOut = output.map(x => Math.exp(x - maxVal));
                const sumExp = expOut.reduce((a, b) => a + b, 0);
                const probabilities = expOut.map(x => x / sumExp);

                const maxProb = Math.max(...probabilities);
                const classIdx = probabilities.indexOf(maxProb);

                const paintingName = classMapping[classIdx] || "Unknown_Painting";

                document.getElementById('ai-debug').innerText = `${paintingName} (${(maxProb * 100).toFixed(1)}%)`;

                if (maxProb > 0.80 && paintingName !== "Unknown_Painting") {
                    if (!activeTrackers.some(t => getIoU(rect, t.rect) > 0.6)) {
                        let newVid = document.createElement('video');
                        newVid.className = 'ar-video-element'; newVid.src = `/videos/${paintingName}.mp4`;
                        newVid.playsInline = true; newVid.autoplay = true; newVid.loop = true; newVid.muted = true;
                        newVid.addEventListener('loadedmetadata', () => { newVid.dataset.ready = 'true'; newVid.play().catch(e => {}); });
                        videoContainer.appendChild(newVid);

                        activeTrackers.push({ id: Date.now(), rect: rect, cx: cx, cy: cy, painting_name: paintingName, vidEl: newVid, lostFrames: 0, updatedThisFrame: true, smoothedCorners: null });
                        document.getElementById('track-count').innerText = activeTrackers.length;
                    }
                } else {
                    failedScans.push({ rect: rect, time: Date.now() });
                }

            } catch (e) {
                console.error("Local Inference Error:", e);
                // Print the exact reason it crashed on the phone screen (limited to 25 chars to fit)
                document.getElementById('ai-debug').innerText = "Err: " + (e.message ? e.message.substring(0, 25) : "Unknown Crash");
            }

            pendingAIAreas = pendingAIAreas.filter(p => p.id !== pendingId);
        }

        function applyCSSMatrix(cornersArray, vidW, vidH, targetVideoEl) {
            const corners = [ { x: cornersArray[0], y: cornersArray[1] }, { x: cornersArray[2], y: cornersArray[3] }, { x: cornersArray[4], y: cornersArray[5] }, { x: cornersArray[6], y: cornersArray[7] } ];
            const arW = targetVideoEl.videoWidth || vidW, arH = targetVideoEl.videoHeight || vidH;
            const transform = calculateCSSMatrix( [0, 0, arW, 0, arW, arH, 0, arH], [corners[0].x, corners[0].y, corners[1].x, corners[1].y, corners[2].x, corners[2].y, corners[3].x, corners[3].y] );
            targetVideoEl.style.width = arW + "px"; targetVideoEl.style.height = arH + "px";
            targetVideoEl.style.transform = `matrix3d(${transform.join(',')})`;
        }

        function calculateCSSMatrix(src, dst) {
            let a = [], b = [];
            for (let i = 0; i < 4; i++) {
                a.push([src[i*2], src[i*2+1], 1, 0, 0, 0, -src[i*2]*dst[i*2], -src[i*2+1]*dst[i*2]]);
                a.push([0, 0, 0, src[i*2], src[i*2+1], 1, -src[i*2]*dst[i*2+1], -src[i*2+1]*dst[i*2+1]]);
                b.push(dst[i*2], dst[i*2+1]);
            }
            let h = solveLinearSystem(a, b);
            return [ h[0], h[3], 0, h[6], h[1], h[4], 0, h[7], 0, 0, 1, 0, h[2], h[5], 0, 1 ];
        }

        function solveLinearSystem(a, b) {
            for (let i = 0; i < 8; i++) {
                let pivot = i; for (let j = i + 1; j < 8; j++) if (Math.abs(a[j][i]) > Math.abs(a[pivot][i])) pivot = j;
                [a[i], a[pivot]] = [a[pivot], a[i]]; [b[i], b[pivot]] = [b[pivot], b[i]];
                let p = a[i][i]; for (let j = i; j < 8; j++) a[i][j] /= p; b[i] /= p;
                for (let j = 0; j < 8; j++) { if (j !== i) { let factor = a[j][i]; for (let k = i; k < 8; k++) a[j][k] -= factor * a[i][k]; b[j] -= factor * b[i]; } }
            }
            return b;
        }
    </script>
